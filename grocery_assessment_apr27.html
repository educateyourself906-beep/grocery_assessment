<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocery Shopping Quiz - Class 222A</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Poppins:wght@900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #ecfdf5; }
        .card { display: none; }
        .card.active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .btn-opt.selected { background-color: #10b981; color: white; border-color: #059669; }
        #badge-modal { display: none; position: fixed; inset: 0; background: rgba(6, 78, 59, 0.95); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body class="p-4 flex flex-col items-center">

    <div id="quiz-container" class="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden border border-emerald-100 mt-6">
        
        <!-- Header -->
        <div class="bg-emerald-600 p-6 text-center text-white border-b-4 border-emerald-700">
            <h1 class="text-xl font-black uppercase tracking-widest italic">The Smart Shopper</h1>
            <div class="w-full bg-emerald-800 h-1.5 rounded-full mt-4">
                <div id="progress-bar" class="bg-emerald-300 h-full w-0 transition-all duration-300"></div>
            </div>
        </div>

        <!-- Start Screen -->
        <div id="card-start" class="card active p-8 text-center">
            <i class="fas fa-shopping-basket text-7xl text-emerald-500 mb-6 drop-shadow-lg"></i>
            <h2 class="text-2xl font-bold mb-2">Checkout Challenge</h2>
            <p class="text-slate-500 mb-6 text-sm">Enter your name to begin your mission.</p>
            <input type="text" id="student-name" placeholder="Full Name" class="w-full p-4 border-2 rounded-xl mb-6 text-center text-lg outline-none focus:border-emerald-500">
            <button onclick="startQuiz()" class="w-full bg-emerald-600 text-white font-black py-4 rounded-xl shadow-lg active:scale-95 transition">START ASSESSMENT</button>
        </div>

        <!-- Questions -->
        <div id="question-space"></div>

        <!-- Result Screen -->
        <div id="card-results" class="card p-8 text-center">
            <div id="res-icon" class="mb-6"></div>
            <h2 id="res-score" class="text-6xl font-black mb-2 text-slate-800">0/12</h2>
            <p id="res-msg" class="text-slate-500 mb-8 font-bold"></p>
            <button id="claim-badge" onclick="showBadge()" class="hidden w-full bg-emerald-600 text-white font-black py-4 rounded-xl shadow-lg mb-4">CLAIM MASTER BADGE</button>
            <button onclick="location.reload()" class="w-full bg-slate-100 text-slate-500 py-3 rounded-xl font-bold">TRY AGAIN</button>
        </div>

        <!-- Navigation -->
        <div id="footer-nav" class="hidden p-6 bg-slate-50 border-t flex justify-between gap-4">
            <button onclick="prev()" class="flex-1 font-bold text-slate-400">Back</button>
            <button id="next-btn" onclick="next()" class="flex-1 py-3 bg-emerald-600 text-white rounded-xl font-black opacity-50 cursor-not-allowed" disabled>Next</button>
        </div>
    </div>

    <!-- Badge Overlay -->
    <div id="badge-modal" onclick="this.style.display='none'">
        <div class="bg-white p-10 rounded-3xl border-8 border-emerald-900 text-center max-w-sm w-full shadow-2xl" onclick="event.stopPropagation()">
            <i class="fas fa-certificate text-8xl text-emerald-500 mb-4"></i>
            <h2 class="text-2xl font-black text-slate-900 mb-1">SHOPPING MASTER</h2>
            <p class="text-xs uppercase tracking-widest text-emerald-400 font-bold mb-6">Functional English Badge</p>
            <p class="text-slate-500 italic mb-2">Awarded to</p>
            <h3 id="badge-name" class="text-2xl font-black text-emerald-700 underline underline-offset-8 mb-6 uppercase">Student</h3>
            <p class="text-xs text-slate-400 font-bold uppercase">April 27, 2026 | Room 222A</p>
            <p class="mt-8 text-[10px] text-slate-300">Take a screenshot for your folder</p>
        </div>
    </div>

    <script>
        const questions = [
            { q: "____ you show me where the eggs are?", o: ["Am", "Do", "Can"], a: 2 },
            { q: "You ____ find the milk in Aisle 3.", o: ["can", "is", "are"], a: 0 },
            { q: "____ I pay with my phone at checkout?", o: ["Am", "Can", "Do"], a: 2 },
            { q: "The ____ section has fruits and vegetables.", o: ["Dairy", "Deli", "Produce"], a: 2 },
            { q: "A row of shelves in a store is called an ____.", o: ["Aisle", "Office", "Atrium"], a: 0 },
            { q: "Use a ____ if you want to buy many groceries.", o: ["Basket", "Cart", "Bin"], a: 1 },
            { q: "The ____ takes your money at the front of the store.", o: ["Security", "Manager", "Cashier"], a: 2 },
            { q: "The machine you use to scan your own items is the ____.", o: ["Self-checkout", "X-ray", "ATM"], a: 0 },
            { q: "From the audio: What aisle is the flour in?", o: ["Aisle 4", "Aisle 7", "Aisle 1"], a: 1 },
            { q: "From the audio: Where are the eggs located?", o: ["Bakery", "Produce", "Dairy"], a: 2 },
            { q: "Polite Request: 'You ____ go in front of me.'", o: ["can", "cant", "must not"], a: 0 },
            { q: "Which item is in the Dairy section?", o: ["Carrots", "Cheese", "Bread"], a: 1 }
        ];

        let cur = 0, answers = {};

        function startQuiz() {
            const name = document.getElementById('student-name').value;
            if(!name) return alert("Enter your name!");
            document.getElementById('badge-name').innerText = name;
            
            const space = document.getElementById('question-space');
            questions.forEach((q, i) => {
                const card = document.createElement('div');
                card.id = `q-${i+1}`; card.className = 'card p-8';
                let opts = q.o.map((o, oi) => `<button onclick="sel(${i}, ${oi}, this)" class="btn-opt w-full p-4 border-2 rounded-xl text-left font-bold mb-3 transition">${o}</button>`).join('');
                card.innerHTML = `<p class="text-xs font-black text-emerald-500 mb-2">QUESTION ${i+1}</p><h3 class="text-xl font-bold mb-6">${q.q}</h3>${opts}`;
                space.appendChild(card);
            });
            document.getElementById('footer-nav').classList.remove('hidden');
            next();
        }

        function sel(qi, oi, btn) {
            answers[qi] = oi;
            btn.parentElement.querySelectorAll('.btn-opt').forEach(b => b.classList.remove('selected', 'bg-emerald-50', 'border-emerald-500'));
            btn.classList.add('selected', 'bg-emerald-50', 'border-emerald-500');
            const n = document.getElementById('next-btn');
            n.disabled = false; n.classList.remove('opacity-50');
        }

        function next() {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            cur++;
            if(cur <= questions.length) {
                document.getElementById(`q-${cur}`).classList.add('active');
                const n = document.getElementById('next-btn');
                if(answers[cur-1] === undefined) { n.disabled = true; n.classList.add('opacity-50'); }
                else { n.disabled = false; n.classList.remove('opacity-50'); }
            } else { finish(); }
            document.getElementById('progress-bar').style.width = (cur/questions.length)*100 + "%";
        }

        function prev() {
            if(cur > 1) {
                document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
                cur--;
                document.getElementById(`q-${cur}`).classList.add('active');
                document.getElementById('next-btn').disabled = false;
                document.getElementById('next-btn').classList.remove('opacity-50');
            }
        }

        function finish() {
            let s = 0; questions.forEach((q, i) => { if(answers[i] === q.a) s++; });
            const p = Math.round((s/questions.length)*100);
            document.getElementById('card-results').classList.add('active');
            document.getElementById('footer-nav').classList.add('hidden');
            document.getElementById('res-score').innerText = `${s}/${questions.length}`;
            const m = document.getElementById('res-msg');
            const icon = document.getElementById('res-icon');
            if(p >= 80) {
                document.getElementById('claim-badge').classList.remove('hidden');
                m.innerText = "EXCELLENT! YOU ARE A MASTER SHOPPER.";
                icon.innerHTML = '<i class="fas fa-award text-8xl text-yellow-500"></i>';
            } else {
                m.innerText = "GOOD EFFORT. REVIEW THE VOCABULARY.";
                icon.innerHTML = '<i class="fas fa-shopping-cart text-8xl text-slate-300"></i>';
            }
        }

        function showBadge() { document.getElementById('badge-modal').style.display = 'flex'; }
    </script>
</body>
</html>
